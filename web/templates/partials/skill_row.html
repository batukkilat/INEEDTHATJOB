<tr id="skill-{{ skill.id }}">
  <td class="px-4 py-2 font-medium text-gray-900">{{ skill.name }}</td>
  <td class="px-4 py-2 text-gray-600">{{ skill.category or '—' }}</td>
  <td class="px-4 py-2 text-gray-600">{{ skill.proficiency or '—' }}</td>
  <td class="px-4 py-2 text-gray-600">{{ skill.years_experience or '—' }}</td>
  <td class="px-4 py-2 text-gray-400 text-xs">{{ skill.keywords or '—' }}</td>
  <td class="px-4 py-2 whitespace-nowrap">
    <button
      hx-get="/profile/skills/{{ skill.id }}/edit"
      hx-target="#skill-{{ skill.id }}"
      hx-swap="outerHTML"
      class="btn btn-ghost btn-sm mr-1">Edit</button>
    <button
      hx-delete="/profile/skills/{{ skill.id }}"
      hx-target="#skill-{{ skill.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete '{{ skill.name }}'?"
      class="btn btn-ghost btn-sm text-red-500 hover:text-red-700">Delete</button>
  </td>
</tr>
{% if oob_clear_skill_form is defined and oob_clear_skill_form %}
<div id="skill-add-form" hx-swap-oob="true"></div>
{% endif %}

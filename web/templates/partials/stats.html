<div class="bg-white rounded-xl border border-gray-100 p-5 shadow-sm">
  <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-3">Jobs Found</p>
  <p class="text-3xl font-bold text-gray-900 tabular-nums">{{ total_jobs }}</p>
  <p class="text-xs text-gray-400 mt-2">across all platforms</p>
</div>
<div class="bg-white rounded-xl border border-gray-100 p-5 shadow-sm">
  <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-3">Strong Matches</p>
  <p class="text-3xl font-bold text-blue-600 tabular-nums">{{ good_matches }}</p>
  <p class="text-xs text-gray-400 mt-2">score ≥ 55%</p>
</div>
<div class="rounded-xl border p-5 shadow-sm {% if pending_review %}bg-amber-50 border-amber-100{% else %}bg-white border-gray-100{% endif %}">
  <p class="text-xs font-medium uppercase tracking-wider mb-3 {% if pending_review %}text-amber-500{% else %}text-gray-400{% endif %}">To Review</p>
  <p class="text-3xl font-bold tabular-nums {% if pending_review %}text-amber-500{% else %}text-gray-900{% endif %}">{{ pending_review }}</p>
  {% if pending_review %}
  <a href="/review" class="text-xs text-amber-600 hover:text-amber-700 font-medium mt-2 inline-flex items-center gap-1">
    Open queue
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="12" height="12"><path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z" clip-rule="evenodd" /></svg>
  </a>
  {% else %}
  <p class="text-xs text-gray-400 mt-2">nothing pending</p>
  {% endif %}
</div>
<div class="bg-white rounded-xl border border-gray-100 p-5 shadow-sm">
  <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-3">Sent</p>
  <p class="text-3xl font-bold text-emerald-600 tabular-nums">{{ applied }}</p>
  <p class="text-xs text-gray-400 mt-2">applications submitted</p>
</div>

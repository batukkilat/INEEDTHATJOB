<div id="email-{{ app.id }}" class="p-5">
  <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Application Email</p>
  {% if app.email_body %}
  <p class="text-xs text-gray-500 mb-1">Subject: <span class="font-medium text-gray-700">{{ app.email_subject }}</span></p>
  <textarea
    hx-put="/review/{{ app.id }}/email"
    hx-trigger="blur"
    name="email_body"
    rows="5"
    class="w-full text-sm text-gray-700 leading-relaxed p-3 border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-300 resize-y mb-3">{{ app.email_body }}</textarea>

  <!-- Recipient + send -->
  <div class="flex items-center gap-2">
    <input
      type="email"
      name="recipient_email"
      value="{{ app.recipient_email or '' }}"
      placeholder="HR email (e.g. careers@company.com)"
      hx-put="/review/{{ app.id }}/recipient-email"
      hx-trigger="blur"
      hx-swap="none"
      class="flex-1 px-3 py-1.5 text-sm border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-300 placeholder-gray-300">
    <button
      hx-post="/review/{{ app.id }}/send"
      hx-target="#send-status-{{ app.id }}"
      hx-swap="innerHTML"
      hx-disabled-elt="this"
      {% if not app.recipient_email %}disabled title="Enter recipient email first"{% endif %}
      class="btn btn-primary btn-sm disabled:opacity-40 disabled:cursor-not-allowed">
      Send
    </button>
    <span id="send-status-{{ app.id }}" class="text-sm"></span>
  </div>
  {% else %}
  <button
    hx-post="/review/{{ app.id }}/generate-email"
    hx-target="#email-{{ app.id }}"
    hx-swap="outerHTML"
    hx-disabled-elt="this"
    class="btn btn-secondary btn-sm disabled:opacity-50 disabled:cursor-wait">
    Generate Application Email
    <span class="htmx-indicator">— generating… (~30s)</span>
  </button>
  {% endif %}
</div>

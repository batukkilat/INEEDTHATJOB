<div id="email-{{ app.id }}" class="p-5">
  <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Application Email</p>
  {% if app.email_body %}
  <p class="text-xs text-gray-500 mb-2">Subject: <span class="font-medium text-gray-700">{{ app.email_subject }}</span></p>
  <textarea
    hx-put="/review/{{ app.id }}/email"
    hx-trigger="blur"
    name="email_body"
    rows="5"
    class="w-full text-sm text-gray-700 leading-relaxed p-3 border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-300 resize-y">{{ app.email_body }}</textarea>
  {% else %}
  <button
    hx-post="/review/{{ app.id }}/generate-email"
    hx-target="#email-{{ app.id }}"
    hx-swap="outerHTML"
    hx-disabled-elt="this"
    class="btn btn-secondary btn-sm disabled:opacity-50 disabled:cursor-wait">
    Generate Application Email
    <span class="htmx-indicator">— generating… (~30s)</span>
  </button>
  {% endif %}
</div>

<div id="header-actions-{{ app.id }}" class="flex gap-2 flex-shrink-0 flex-wrap justify-end">
  {% if app.resume_path %}
  <a href="/review/{{ app.id }}/download" class="btn btn-secondary btn-sm">↓ Resume</a>
  {% endif %}
  {% if job %}
  <a href="{{ job.url }}" target="_blank"
     hx-post="/review/{{ app.id }}/apply-manual"
     hx-target="#app-{{ app.id }}"
     hx-swap="outerHTML"
     hx-trigger="click"
     class="btn btn-sm border border-blue-200 text-blue-600 hover:bg-blue-50">
    Apply via Platform ↗
  </a>
  {% endif %}
  <button
    hx-post="/review/{{ app.id }}/approve"
    hx-target="#app-{{ app.id }}"
    hx-swap="outerHTML"
    class="btn btn-primary btn-sm">Approve</button>
  <button
    hx-get="/review/{{ app.id }}/reject-options"
    hx-target="#header-actions-{{ app.id }}"
    hx-swap="innerHTML"
    class="btn btn-sm border border-gray-200 text-gray-500 hover:bg-gray-50">Skip ▾</button>
</div>

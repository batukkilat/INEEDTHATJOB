<tr id="education-{{ edu.id }}">
  <td class="px-4 py-2 font-medium text-gray-900">{{ edu.institution }}</td>
  <td class="px-4 py-2 text-gray-600">{{ edu.degree }}</td>
  <td class="px-4 py-2 text-gray-600">{{ edu.field or '—' }}</td>
  <td class="px-4 py-2 text-gray-400 text-xs">{{ edu.start_date or '' }}{% if edu.start_date and edu.end_date %} – {% endif %}{{ edu.end_date or '' }}</td>
  <td class="px-4 py-2 text-gray-600">{{ edu.gpa or '—' }}</td>
  <td class="px-4 py-2 whitespace-nowrap">
    <button
      hx-get="/profile/education/{{ edu.id }}/edit"
      hx-target="#education-{{ edu.id }}"
      hx-swap="outerHTML"
      class="btn btn-ghost btn-sm mr-1">Edit</button>
    <button
      hx-delete="/profile/education/{{ edu.id }}"
      hx-target="#education-{{ edu.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete this education entry?"
      class="btn btn-ghost btn-sm text-red-500">Delete</button>
  </td>
</tr>
{% if oob_clear_education_form is defined and oob_clear_education_form %}
<div id="education-add-form" hx-swap-oob="true"></div>
{% endif %}

<div id="cover-letter-{{ app.id }}" class="p-5 border-b border-gray-100">
  <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Cover Letter
    {% if app.cover_letter %}<span class="text-gray-300 font-normal normal-case">(click to edit, auto-saves on blur)</span>{% endif %}
  </p>
  {% if app.cover_letter %}
  <textarea
    hx-put="/review/{{ app.id }}/cover-letter"
    hx-trigger="blur"
    name="cover_letter"
    rows="8"
    class="w-full text-sm text-gray-700 leading-relaxed p-3 border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-300 resize-y">{{ app.cover_letter }}</textarea>
  {% else %}
  <button
    hx-post="/review/{{ app.id }}/generate-cover-letter"
    hx-target="#cover-letter-{{ app.id }}"
    hx-swap="outerHTML"
    hx-disabled-elt="this"
    class="btn btn-secondary btn-sm disabled:opacity-50 disabled:cursor-wait">
    Generate Cover Letter
    <span class="htmx-indicator">— generating… (~30s)</span>
  </button>
  {% endif %}
</div>

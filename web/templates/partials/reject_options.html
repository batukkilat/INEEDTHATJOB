<div id="reject-options-{{ app_id }}" class="flex flex-wrap items-center gap-1.5">
  <span class="text-xs text-gray-400 mr-1">Skip reason:</span>
  {% for reason in ["No HR email", "Apply via platform", "Not a good fit", "Already applied"] %}
  <button
    hx-post="/review/{{ app_id }}/reject"
    hx-vals='{"reason": "{{ reason }}"}'
    hx-target="#app-{{ app_id }}"
    hx-swap="outerHTML"
    class="px-2 py-1 text-xs rounded border border-gray-200 text-gray-600 hover:bg-red-50 hover:border-red-200 hover:text-red-600">
    {{ reason }}
  </button>
  {% endfor %}
  <button
    hx-get="/review/{{ app_id }}/header-actions"
    hx-target="#header-actions-{{ app_id }}"
    hx-swap="innerHTML"
    class="px-2 py-1 text-xs text-gray-300 hover:text-gray-500">
    ✕
  </button>
</div>

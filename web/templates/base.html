<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}INEEDTHATJOB{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/custom.css">
</head>
<body class="bg-gray-50 text-gray-900 h-screen overflow-hidden flex">

  <!-- Sidebar -->
  <aside class="w-52 bg-gray-900 text-gray-100 flex flex-col flex-shrink-0 h-full">
    <div class="px-4 py-5 border-b border-gray-700">
      <span class="text-sm font-bold tracking-widest uppercase text-blue-400">INEEDTHATJOB</span>
    </div>
    <nav class="flex-1 px-2 py-4 space-y-0.5 overflow-y-auto">
      {% set p = current_page | default("") %}
      <a href="/"        class="nav-link {% if p == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/jobs"    class="nav-link {% if p == 'jobs' %}active{% endif %}">Jobs</a>
      <a href="/review"  class="nav-link {% if p == 'review' %}active{% endif %}">
        Review Queue
        {% if pending_review_count is defined and pending_review_count %}
          <span class="ml-auto badge badge-blue">{{ pending_review_count }}</span>
        {% endif %}
      </a>
      <a href="/history" class="nav-link {% if p == 'history' %}active{% endif %}">History</a>
      <a href="/profile" class="nav-link {% if p == 'profile' %}active{% endif %}">Profile</a>
      <a href="/settings" class="nav-link {% if p == 'settings' %}active{% endif %}">Settings</a>
    </nav>
    <div class="px-4 py-3 border-t border-gray-700 text-xs text-gray-500">
      Phase 1 — Foundation
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <div class="flex-1 overflow-y-auto p-6">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
